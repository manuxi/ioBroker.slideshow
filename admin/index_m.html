<html>

<head>

	<!-- Load ioBroker scripts and styles-->
	<link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
	<link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

	<script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
	<script type="text/javascript" src="../../socket.io/socket.io.js"></script>

	<script type="text/javascript" src="../../js/translate.js"></script>
	<script type="text/javascript" src="../../lib/js/materialize.js"></script>
	<script type="text/javascript" src="../../js/adapter-settings.js"></script>

	<!-- Load our own files -->
	<link rel="stylesheet" type="text/css" href="style.css" />
	<script type="text/javascript" src="words.js"></script>

	<script type="text/javascript">
		// Cached album list state for the admin page
		var __slideshow_album_list = [];          // [{name, space}, ...] from info.albums
		var __slideshow_selected_albums = [];     // currently checked names
		var __slideshow_onChange = null;

		// This will be called by the admin adapter when the settings page loads
		function load(settings, onChange) {
			// example: select elements with id=key and class=value and insert value
			if (!settings) return;
			__slideshow_onChange = onChange;
			__slideshow_selected_albums = Array.isArray(settings.syno_albums) ? settings.syno_albums.slice() : [];

			$('.value').each(function () {
				var $key = $(this);
				var id = $key.attr('id');
				if ($key.attr('type') === 'checkbox') {
					// do not call onChange direct, because onChange could expect some arguments
					$key.prop('checked', settings[id])
						.on('change', () => onChange())
						;
				} else if ($key.attr('type') === 'radio'){
					$("input[name=provider][value=" + settings['provider'] + "]").attr('checked', 'checked');
					$key.on('change', () => onChange());
				} else {
					// do not call onChange direct, because onChange could expect some arguments
					$key.val(settings[id])
						.on('change', () => onChange())
						.on('keyup', () => onChange())
						;
				}
			});

			ChangeSource();

			// Load album list from info.albums state and render checkboxes
			loadAlbumListFromState();

			$('#syno_albums_reload').off('click').on('click', function () {
				reloadAlbumListFromAdapter();
			});

			onChange(false);
			// reinitialize all the Materialize labels on the page if you are dynamically adding inputs:
			if (M) M.updateTextFields();
		}

		function loadAlbumListFromState() {
			var stateId = adapter + '.' + instance + '.info.albums';
			socket.emit('getState', stateId, function (err, state) {
				if (err || !state || !state.val) {
					renderAlbumList([]);
					return;
				}
				try {
					var parsed = JSON.parse(state.val);
					if (Array.isArray(parsed)) {
						__slideshow_album_list = parsed;
					}
				} catch (e) {
					__slideshow_album_list = [];
				}
				renderAlbumList(__slideshow_album_list);
			});
		}

		function reloadAlbumListFromAdapter() {
			var $btn = $('#syno_albums_reload');
			$btn.prop('disabled', true);
			sendTo(null, 'listAlbums', {}, function (result) {
				$btn.prop('disabled', false);
				if (Array.isArray(result)) {
					__slideshow_album_list = result;
					renderAlbumList(__slideshow_album_list);
				}
			});
		}

		function renderAlbumList(albums) {
			var $container = $('#syno_albums_container');
			$container.empty();

			if (!albums || albums.length === 0) {
				$container.append('<p class="translate" style="color:#888;">syno_albums_empty</p>');
				if (typeof translateAll === 'function') translateAll();
				return;
			}

			// Group by space for readability
			var groups = { 'personal': [], 'shared-with-me': [], 'team': [] };
			albums.forEach(function (a) {
				var key = groups[a.space] ? a.space : 'personal';
				groups[key].push(a);
			});

			['personal', 'shared-with-me', 'team'].forEach(function (space) {
				if (groups[space].length === 0) return;
				$container.append('<div style="font-weight:bold; margin-top:6px;" class="translate">syno_space_' + space + '</div>');
				groups[space].forEach(function (a) {
					var checked = __slideshow_selected_albums.indexOf(a.name) !== -1 ? 'checked' : '';
					var safeName = String(a.name).replace(/"/g, '&quot;');
					$container.append(
						'<p style="margin:2px 0;"><label>' +
						'<input type="checkbox" class="syno_album_cb" data-name="' + safeName + '" ' + checked + ' />' +
						'<span>' + safeName + '</span>' +
						'</label></p>'
					);
				});
			});

			$container.find('.syno_album_cb').on('change', function () {
				var name = $(this).data('name');
				if ($(this).prop('checked')) {
					if (__slideshow_selected_albums.indexOf(name) === -1) __slideshow_selected_albums.push(name);
				} else {
					__slideshow_selected_albums = __slideshow_selected_albums.filter(function (n) { return n !== name; });
				}
				if (typeof __slideshow_onChange === 'function') __slideshow_onChange();
			});

			if (typeof translateAll === 'function') translateAll();
		}
		
		

		$(document).on("change","input[type=radio]",function(){
			ChangeSource();
		});

		function ChangeSource(){
			switch(parseInt($("input:radio[name ='provider']:checked").val())){
				case 3:
					$("#syno_settings").hide();
					$("#fs_settings").show();
					break;
				case 4:
					$("#fs_settings").hide();	
					$("#syno_settings").show();
					break;
				default:
					$("#fs_settings").hide();
					$("#syno_settings").hide();
			} 
		}

		// This will be called by the admin adapter when the user presses the save button
		function save(callback) {
			// example: select elements with class=value and build settings object
			var obj = {};
			$('.value').each(function () {
				var $this = $(this);
				if ($this.attr('type') === 'checkbox') {
					obj[$this.attr('id')] = $this.prop('checked');
				} else if ($this.attr('type') === 'number') {
					obj[$this.attr('id')] = parseFloat($this.val());
				} else if ($this.hasClass("isNumeric")){
					obj[$this.attr('id')] = parseInt($this.val());
				} else if ($this.attr('type') === 'radio'){
					obj['provider'] = parseInt($("input:radio[name ='provider']:checked").val());
				} else {
					obj[$this.attr('id')] = $this.val();
				}
			});
			obj.syno_albums = __slideshow_selected_albums.slice();
			callback(obj);
		}
	</script>

</head>

<body>

	<div class="m adapter-container">

		<div class="row">
			<!-- Tabs Navigation-->
			<div class="col s12">
				<ul class="tabs">
					<li class="tab col s2"><a href="#tab_settings" class="translate">tab_general</a></li>
				</ul>
			</div>

			<!-- Tab Settings-->
			<div id="tab_settings" class="col s12 page">
				<div class="row">
					<div class="col s12 m2 l1">
						<img src="slideshow.png" class="logo">
					</div>
				</div>
				<div class="row">
					<div class="col s6">
						<div>
							<h5 class="translate">s_common</h5>
						</div>
						<div><br /></div>
						<label class="translate">p_source</label>
						<div class="input-field" id="fs_provider">
							<p>
								<label>
								  <input name="provider" type="radio" checked value=1 class="value fs_provider" />
								  <span class="translate">p_bing</span><br/>
								  <span class="translate">p_bing_desc</span>
								</label>
							  </p>
							  <p>
								<label>
								  <input name="provider" type="radio" value=2 class="value fs_provider" />
								  <span class="translate">p_local</span><br/>
								  <span class="translate">p_local_desc</span>
								</label>
							  </p>
							  <p>
								<label>
								  <input name="provider" type="radio" value=3 class="value fs_provider" />
								  <span class="translate">p_fs</span><br/>
								  <span class="translate">p_fs_desc</span>
								</label>
							  </p>
							  <p>
								<label>
								  <input name="provider" type="radio" value=4 class="value fs_provider" />
								  <span class="translate">p_syno</span><br/>
								  <span class="translate">p_syno_desc</span>
								</label>
							  </p>
							</p>
						</div>
						<div><br /></div>
						<div class="input-field">
							<input type="number" class="value" min="3" id="update_interval" />
							<label for="update_interval" class="translate">update_interval</label>
						</div>
						<div><br /></div>
						<div class="input-field">
							<input type="number" class="value" min="0" max="24" id="update_picture_list" />
							<label for="update_picture_list" class="translate">update_picture_list</label>
						</div>
						<div><br /></div>
						<div class="input-field">
							<input type="checkbox" class="value" id="downloadLocationData" />
							<label for="downloadLocationData" class="translate">downloadLocationData</label>
						</div>
						<div><br /></div>
					</div>
					<div class="col s6">
						<div id="fs_settings" style="display: none;">
							<div>
								<h5 class="translate">s_filesystem</h5>
							</div>
							<div><br /></div>
							<div class="input-field">
								<input type="text" class="value" id="fs_path" />
								<label for="fs_path" class="translate">fs_path</label>
							</div>
							<div><br /></div>
							<div class="input-field">
								<select class="value isNumeric" id="fs_format">
									<option value=0 class="translate">fs_format_all</option>
									<option value=1 class="translate">fs_format_landscape</option>
									<option value=2 class="translate">fs_format_portrait</option>
								</select>
								<label for="fs_format" class="translate">fs_format</label>
							</div>
							<div><br /></div>
							<div class="input-field">
								<select class="value isNumeric" id="fs_order">
									<option value=0 class="translate">display_order_taken</option>
									<option value=1 class="translate">display_order_filename</option>
									<option value=3 class="translate">display_order_random</option>
								</select>
								<label for="fs_order" class="translate">display_order</label>
							</div>
							<div><br /></div>
							<p class="translate">config_check_log</p>
						</div>
						<div id="syno_settings" style="display: none;">
							<div>
								<h5 class="translate">s_syno</h5>
							</div>
							<div><br /></div>
							<div class="input-field">
								<select class="value isNumeric" id="syno_version">
									<option value=0 >DSM 7</option>
									<option value=1 >DSM 6</option>
								</select>
								<label for="syno_version" class="translate">syno_version</label>
							</div>
							<div><br /></div>
							<div class="input-field">
								<input type="text" class="value" id="syno_path" />
								<label for="syno_path" class="translate">syno_path</label>
							</div>
							<div><br /></div>
							<div class="input-field">
								<input type="text" class="value" id="syno_username" />
								<label for="syno_username" class="translate">syno_username</label>
							</div>
							<div><br /></div>
							<div class="input-field">
								<input type="password" class="value" id="syno_userpass" />
								<label for="syno_userpass" class="translate">syno_userpass</label>
							</div>
							<div><br /></div>
							<!-- Legacy single-album field, kept hidden for backwards compatibility -->
							<input type="hidden" class="value" id="syno_album" />
							<div style="margin-bottom:16px;">
								<div style="font-weight:500; margin-bottom:6px;" class="translate">syno_albums_label</div>
								<div id="syno_albums_container" style="max-height:260px; overflow-y:auto; border:1px solid #d0d0d0; border-radius:3px; padding:8px 12px; background:#fafafa;"></div>
								<div style="margin-top:8px;">
									<a class="btn waves-effect waves-light" id="syno_albums_reload">
										<i class="material-icons left">refresh</i><span class="translate">syno_albums_reload</span>
									</a>
								</div>
							</div>
							<div><br /></div>
							<div class="input-field">
								<select class="value isNumeric" id="syno_format">
									<option value=0 class="translate">fs_format_all</option>
									<option value=1 class="translate">fs_format_landscape</option>
									<option value=2 class="translate">fs_format_portrait</option>
								</select>
								<label for="syno_format" class="translate">fs_format</label>
							</div>
							<div><br /></div>
							<div class="input-field">
								<select class="value isNumeric" id="syno_order">
									<option value=0 class="translate">display_order_taken</option>
									<option value=1 class="translate">display_order_filename</option>
									<option value=3 class="translate">display_order_random</option>
								</select>
								<label for="syno_order" class="translate">display_order</label>
							</div>
							<div><br /></div>
							<p class="translate">config_check_log</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
